<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Oasis - Admin Order Board</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: {
                            50: '#fdfbf7',
                            100: '#fbf7ed',
                            200: '#f4ebd1',
                            300: '#e7d8a9',
                            400: '#d7bf7d',
                            500: '#c5a353',
                            600: '#b48d41',
                            700: '#967134',
                            800: '#79582b',
                            900: '#634724',
                            950: '#392713',
                        },
                        obsidian: {
                            50: '#f4f4f5',
                            100: '#e4e4e7',
                            200: '#d4d4d8',
                            300: '#a1a1aa',
                            400: '#71717a',
                            500: '#52525b',
                            600: '#3f3f46',
                            700: '#27272a',
                            800: '#18181b',
                            900: '#0f0f11',
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(15, 15, 17, 0.1);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(197, 163, 83, 0.2);
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(197, 163, 83, 0.4);
        }
        .pulse-gold {
            animation: pulse-gold-animation 2s infinite;
        }
        @keyframes pulse-gold-animation {
            0% {
                box-shadow: 0 0 0 0 rgba(197, 163, 83, 0.4);
            }
            70% {
                box-shadow: 0 0 0 8px rgba(197, 163, 83, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(197, 163, 83, 0);
            }
        }
    </style>
</head>
<body class="bg-obsidian-950 text-zinc-100 font-sans min-h-screen flex flex-col antialiased selection:bg-gold-500 selection:text-obsidian-950">

    <!-- Header -->
    <header class="w-full bg-obsidian-900 border-b border-gold-900/20 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="font-serif text-2xl font-bold tracking-widest text-gold-400">AURA OASIS</span>
            <div class="h-6 w-px bg-zinc-800"></div>
            <span class="text-zinc-400 font-medium tracking-wide text-sm uppercase">In-Room Order Operations</span>
        </div>

        <div class="flex items-center gap-4">
            <!-- Sound Test Button -->
            <button onclick="playNotificationChime()" class="text-xs bg-zinc-850 hover:bg-zinc-800 border border-zinc-700 text-zinc-300 font-medium px-3 py-1.5 rounded-lg transition-all flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gold-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
                Test Sound
            </button>

            <!-- WebSocket Connection Status Badge -->
            <div id="ws-status" class="bg-red-950/40 border border-red-500/30 text-red-400 text-xs px-3 py-1.5 rounded-full flex items-center gap-2 font-semibold">
                <span class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span>
                DISCONNECTED
            </div>
        </div>
    </header>

    <!-- Dashboard Board Columns -->
    <main class="flex-grow p-8 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden">
        
        <!-- COLUMN 1: PENDING -->
        <section class="bg-obsidian-900/60 border border-zinc-800/40 rounded-2xl flex flex-col h-[calc(100vh-140px)]">
            <div class="p-5 border-b border-zinc-800/60 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <span class="w-3 h-3 bg-amber-500 rounded-full animate-ping"></span>
                    <h2 class="font-serif text-lg font-bold text-zinc-100">Incoming Requests</h2>
                </div>
                <span id="count-pending" class="bg-amber-950 border border-amber-500/30 text-amber-400 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
            </div>
            
            <div id="col-pending" class="p-5 flex-grow overflow-y-auto custom-scroll space-y-4">
                <!-- Cards inserted dynamically -->
            </div>
        </section>

        <!-- COLUMN 2: ACCEPTED / PREPARING -->
        <section class="bg-obsidian-900/60 border border-zinc-800/40 rounded-2xl flex flex-col h-[calc(100vh-140px)]">
            <div class="p-5 border-b border-zinc-800/60 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <span class="w-3 h-3 bg-sky-500 rounded-full"></span>
                    <h2 class="font-serif text-lg font-bold text-zinc-100">In Preparation</h2>
                </div>
                <span id="count-accepted" class="bg-sky-950 border border-sky-500/30 text-sky-400 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
            </div>
            
            <div id="col-accepted" class="p-5 flex-grow overflow-y-auto custom-scroll space-y-4">
                <!-- Cards inserted dynamically -->
            </div>
        </section>

        <!-- COLUMN 3: FULFILLED HISTORY -->
        <section class="bg-obsidian-900/60 border border-zinc-800/40 rounded-2xl flex flex-col h-[calc(100vh-140px)]">
            <div class="p-5 border-b border-zinc-800/60 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <span class="w-3 h-3 bg-zinc-600 rounded-full"></span>
                    <h2 class="font-serif text-lg font-bold text-zinc-100">Fulfillment Log</h2>
                </div>
                <span id="count-history" class="bg-zinc-850 border border-zinc-700 text-zinc-400 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
            </div>
            
            <div id="col-history" class="p-5 flex-grow overflow-y-auto custom-scroll space-y-4">
                <!-- Cards inserted dynamically -->
            </div>
        </section>

    </main>

    <!-- JS Operations -->
    <script>
        // State
        let ordersMap = {}; // orderId -> Order Object
        let wsConn = null;

        // On Load
        window.addEventListener('DOMContentLoaded', () => {
            fetchOrders();
            connectWebSocket();
        });

        // Fetch historically active orders from Database API
        async function fetchOrders() {
            try {
                const response = await fetch('/api/v1/orders');
                if (!response.ok) throw new Error("Could not fetch historical orders");
                const orders = await response.json();
                
                (orders || []).forEach(order => {
                    ordersMap[order.id] = order;
                });
                renderBoard();
            } catch (err) {
                console.error("Fetch orders failed:", err);
            }
        }

        // Connect to Go Server WebSocket stream
        function connectWebSocket() {
            const statusBadge = document.getElementById('ws-status');
            
            // Build WebSocket URL
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/admin`;

            console.log(`Connecting to WebSocket: ${wsUrl}`);
            wsConn = new WebSocket(wsUrl);

            wsConn.onopen = () => {
                console.log("WebSocket connected successfully");
                statusBadge.className = "bg-emerald-950/40 border border-emerald-500/30 text-emerald-400 text-xs px-3 py-1.5 rounded-full flex items-center gap-2 font-semibold";
                statusBadge.innerHTML = `<span class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> CONNECTED`;
            };

            wsConn.onclose = (e) => {
                console.warn("WebSocket closed. Attempting reconnect in 3s...", e.reason);
                statusBadge.className = "bg-red-950/40 border border-red-500/30 text-red-400 text-xs px-3 py-1.5 rounded-full flex items-center gap-2 font-semibold";
                statusBadge.innerHTML = `<span class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span> DISCONNECTED`;
                
                setTimeout(connectWebSocket, 3000);
            };

            wsConn.onerror = (err) => {
                console.error("WebSocket error:", err);
                wsConn.close();
            };

            wsConn.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    console.log("WS event received:", message);

                    if (message.type === 'order_created') {
                        // Play Alert Chime
                        playNotificationChime();
                        
                        // Save and render
                        const newOrder = message.payload;
                        ordersMap[newOrder.id] = newOrder;
                        renderBoard();
                    } 
                    else if (message.type === 'order_updated') {
                        const updatedOrder = message.payload;
                        ordersMap[updatedOrder.id] = updatedOrder;
                        renderBoard();
                    }
                } catch (err) {
                    console.error("Failed to parse websocket message:", err);
                }
            };
        }

        // Synthesize Dual Tone Notification chime via Web Audio API
        function playNotificationChime() {
            try {
                // Creates clean browser sound context
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                const ctx = new AudioCtx();

                // Tone 1: High frequency pitch D6 (1174.66 Hz)
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(1174.66, ctx.currentTime);
                gain1.gain.setValueAtTime(0, ctx.currentTime);
                gain1.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.04);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);

                // Tone 2: Harmonious chord pitch A6 (1760.00 Hz) sounding slightly later
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1760.00, ctx.currentTime + 0.08);
                gain2.gain.setValueAtTime(0, ctx.currentTime);
                gain2.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.12);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);

                // Execute
                osc1.start();
                osc1.stop(ctx.currentTime + 0.6);
                
                osc2.start();
                osc2.stop(ctx.currentTime + 0.8);
            } catch (e) {
                console.warn("Web Audio chime blocked or failed:", e);
            }
        }

        // Render Cards in appropriate board columns
        function renderBoard() {
            const colPending = document.getElementById('col-pending');
            const colAccepted = document.getElementById('col-accepted');
            const colHistory = document.getElementById('col-history');

            // Clear columns
            colPending.innerHTML = '';
            colAccepted.innerHTML = '';
            colHistory.innerHTML = '';

            let countPend = 0;
            let countAccep = 0;
            let countHist = 0;

            // Sort orders by creation timestamp (newest first for Pending, oldest first for preparing is nice, but we can do descending)
            const sortedOrders = Object.values(ordersMap).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            sortedOrders.forEach(order => {
                const card = createOrderCard(order);

                if (order.status === 'pending') {
                    colPending.appendChild(card);
                    countPend++;
                } else if (order.status === 'accepted') {
                    colAccepted.appendChild(card);
                    countAccep++;
                } else {
                    colHistory.appendChild(card);
                    countHist++;
                }
            });

            // Update Counts
            document.getElementById('count-pending').innerText = countPend;
            document.getElementById('count-accepted').innerText = countAccep;
            document.getElementById('count-history').innerText = countHist;
        }

        // Generate Order Card DOM elements
        function createOrderCard(order) {
            const card = document.createElement('div');
            
            // Layout depending on column
            let statusBorder = "border-zinc-800/80";
            let pulseClass = "";
            let actionsHTML = "";

            if (order.status === 'pending') {
                statusBorder = "border-gold-500/40";
                pulseClass = "pulse-gold";
                actionsHTML = `
                    <div class="grid grid-cols-2 gap-2 mt-4 pt-3 border-t border-zinc-800/40">
                        <button onclick="updateStatus('${order.id}', 'accepted')" class="bg-gold-500 hover:bg-gold-600 text-obsidian-950 text-xs font-semibold py-2 px-3 rounded-lg transition-all">
                            Accept Order
                        </button>
                        <button onclick="updateStatus('${order.id}', 'cancelled')" class="bg-red-950/40 hover:bg-red-900/30 border border-red-500/30 text-red-400 text-xs font-semibold py-2 px-3 rounded-lg transition-all">
                            Reject
                        </button>
                    </div>
                `;
            } else if (order.status === 'accepted') {
                statusBorder = "border-sky-500/30";
                actionsHTML = `
                    <div class="grid grid-cols-1 gap-2 mt-4 pt-3 border-t border-zinc-800/40">
                        <button onclick="updateStatus('${order.id}', 'completed')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold py-2 px-3 rounded-lg transition-all">
                            Mark Delivered
                        </button>
                    </div>
                `;
            } else if (order.status === 'completed') {
                statusBorder = "border-emerald-500/20";
                actionsHTML = `
                    <div class="mt-2 text-right">
                        <span class="text-[10px] text-emerald-500 bg-emerald-950/40 border border-emerald-500/20 px-2 py-0.5 rounded font-semibold uppercase">Delivered</span>
                    </div>
                `;
            } else {
                statusBorder = "border-red-500/10";
                actionsHTML = `
                    <div class="mt-2 text-right">
                        <span class="text-[10px] text-red-400 bg-red-950/30 border border-red-500/20 px-2 py-0.5 rounded font-semibold uppercase">Cancelled</span>
                    </div>
                `;
            }

            // Create items list HTML
            let itemsListHTML = "";
            (order.items || []).forEach(item => {
                itemsListHTML += `
                    <div class="flex justify-between text-xs text-zinc-300">
                        <span>${item.item_name || 'Item'} <span class="text-zinc-500">x${item.quantity}</span></span>
                        <span class="font-mono text-zinc-400">$${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                `;
            });

            // Relative time calculations
            const orderTime = new Date(order.created_at);
            const timeStr = orderTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            card.className = `p-5 rounded-2xl bg-obsidian-900 border ${statusBorder} ${pulseClass} transition-all flex flex-col justify-between`;
            card.innerHTML = `
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <span class="text-lg font-serif font-bold text-white">Room ${order.room_number || '...'}</span>
                        </div>
                        <span class="text-xs text-zinc-500 font-medium">${timeStr}</span>
                    </div>

                    <div class="space-y-1.5 my-3">
                        ${itemsListHTML}
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mt-3 pt-3 border-t border-zinc-800/40 text-xs">
                        <span class="text-zinc-500">Total Price</span>
                        <span class="font-serif font-bold text-gold-400 text-sm">$${order.total_amount.toFixed(2)}</span>
                    </div>
                    ${actionsHTML}
                </div>
            `;

            return card;
        }

        // Call status update PATCH API
        async function updateStatus(orderId, newStatus) {
            try {
                const response = await fetch(`/api/v1/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Failed to update order status');
                }

                const updatedOrder = await response.json();
                ordersMap[updatedOrder.id] = updatedOrder;
                renderBoard();
            } catch (err) {
                console.error("Status update error:", err);
                alert(`Error updating order status: ${err.message}`);
            }
        }
    </script>
</body>
</html>
