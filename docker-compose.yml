services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_ordering
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_ordering"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-service:
    image: redis:7-alpine
    container_name: hotel_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hotel_ordering_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/hotel_ordering?sslmode=disable
      - REDIS_URL=redis-service:6379
      - MIGRATIONS_DIR=./db
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - STORAGE_BUCKET_NAME=hotel-catalog-images
      # DevOps Production/LAN Testing Notes:
      # For mobile/external testing or production, change 'localhost' in these variables to your machine's LAN IP (e.g., 192.168.1.100) or public domain.
      - STORAGE_PUBLIC_URL_PREFIX=http://${HOST_IP:-localhost}:9000/hotel-catalog-images
      - GUEST_PORTAL_BASE_URL=http://${HOST_IP:-localhost}:3000
      - JWT_SECRET=test_secret_for_local_development_only
    depends_on:
      postgres:
        condition: service_healthy
      redis-service:
        condition: service_healthy
      minio:
        condition: service_started

  minio:
    image: minio/minio:latest
    container_name: hotel_minio
    restart: always
    ports:
      - "9000:9000"
      - "9005:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  frontend:
    build: ./frontend
    container_name: hotel_ordering_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://${HOST_IP:-localhost}:8080
      - NEXT_PUBLIC_WS_URL=ws://${HOST_IP:-localhost}:8080
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  minio_data:
